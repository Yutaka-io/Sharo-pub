<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharo — シェアハウス向け割り勘アプリ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      color: #1F2937;
      background: #F9FAFB;
      line-height: 1.8;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 24px;
      text-align: center;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #059669;
    }
    .tagline {
      font-size: 1rem;
      color: #4B5563;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .links a {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 14px 24px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      color: #1F2937;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .links a:hover {
      background: #ECFDF5;
      border-color: #059669;
    }
    .contact {
      margin-top: 48px;
      font-size: 0.85rem;
      color: #9CA3AF;
    }
    .contact a { color: #059669; text-decoration: none; }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sharo</h1>
    <p class="tagline">友達同士のシェアハウス生活を、お金のストレスゼロに。</p>
    <div class="links">
      <a href="terms.html">利用規約</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
    <p class="contact">
      お問い合わせ: <a href="mailto:sharo-support@googlegroups.com">sharo-support@googlegroups.com</a><br>
      提供: Yutaka.io
    </p>
  </div>
</body>
</html>
